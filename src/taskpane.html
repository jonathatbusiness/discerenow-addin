<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DiscereNow</title>
    <link rel="stylesheet" href="taskpane.css?v=1.2.0" />
  </head>
  <body>
    <div id="app">
      <header class="dn-header">
        <span class="dn-logo">DiscereNow</span>
        <div class="dn-update-trigger">
          <button id="dn-update-badge" class="dn-update-badge" type="button" hidden>
            <span aria-hidden="true">✦</span>
            <span data-i18n="ui.whatsNew">Novidades! Clique aqui</span>
          </button>
          <button id="dn-app-version" class="dn-version" type="button">v1.0.0</button>
        </div>
      </header>

      <aside id="dn-update-panel" class="dn-update-panel" hidden>
        <div class="dn-update-panel-heading">
          <strong data-i18n="ui.updateTitle">Novidades</strong>
          <button id="dn-update-close" class="dn-update-close" type="button" data-i18n-title="ui.closeUpdate" title="Fechar" aria-label="Fechar">×</button>
        </div>
        <span id="dn-update-date" class="dn-update-date"></span>
        <p id="dn-update-message"></p>
      </aside>

      <div class="dn-language-bar">
        <label for="dn-language-select" data-i18n="ui.languageLabel"
          >Idioma</label
        >
        <select id="dn-language-select" class="dn-language-select">
          <option value="pt-BR">Português</option>
          <option value="en">English</option>
        </select>
      </div>

      <div class="dn-scroll">
        <section class="dn-section is-open" data-section="structure">
          <button class="dn-section-header" type="button" aria-expanded="true">
            <span data-i18n="ui.structure">Estrutura</span>
            <span class="dn-section-chevron" aria-hidden="true">⌄</span>
          </button>
          <div class="dn-section-content">
            <div class="dn-row" data-action="apply-chapter">
              <div class="dn-icon dn-icon--accent">C</div>
              <span class="dn-row-name" data-i18n="ui.chapter">Capítulo</span>
              <span class="dn-row-hint" data-i18n="ui.mark">marcar</span>
            </div>
            <div class="dn-row" data-action="apply-lesson">
              <div class="dn-icon dn-icon--accent">L</div>
              <span class="dn-row-name" data-i18n="ui.lesson">Lição</span>
              <span class="dn-row-hint" data-i18n="ui.mark">marcar</span>
            </div>
          </div>
        </section>

        <section class="dn-section is-open" data-section="text">
          <button class="dn-section-header" type="button" aria-expanded="true">
            <span data-i18n="ui.text">Texto</span>
            <span class="dn-section-chevron" aria-hidden="true">⌄</span>
          </button>
          <div class="dn-section-content">
            <div
              class="dn-row"
              data-action="apply-paragraph"
              data-context-tag="DN-paragraph"
            >
              <div class="dn-icon">¶</div>
              <span class="dn-row-name" data-i18n="ui.paragraph"
                >Parágrafo</span
              >
            </div>
            <div class="dn-row" data-action="insert-paragraph-heading" data-context-tag="DN-paragraphHeading">
              <div class="dn-icon">H¶</div>
              <span class="dn-row-name" data-i18n="ui.paragraphHeading">Parágrafo com título</span>
            </div>
            <div class="dn-row" data-action="insert-paragraph-subheading" data-context-tag="DN-paragraphSubheading">
              <div class="dn-icon">S¶</div>
              <span class="dn-row-name" data-i18n="ui.paragraphSubheading">Parágrafo com subtítulo</span>
            </div>
            <div class="dn-row" data-action="insert-heading" data-context-tag="DN-heading">
              <div class="dn-icon">H</div>
              <span class="dn-row-name" data-i18n="ui.heading">Título</span>
            </div>
            <div class="dn-row" data-action="insert-subheading" data-context-tag="DN-subheading">
              <div class="dn-icon">S</div>
              <span class="dn-row-name" data-i18n="ui.subheading">Subtítulo</span>
            </div>
            <div class="dn-row" data-action="insert-columns" data-context-tag="DN-columns">
              <div class="dn-icon">Ⅱ</div>
              <span class="dn-row-name" data-i18n="ui.columns">Colunas</span>
            </div>
            <div class="dn-row" data-action="insert-table" data-context-tag="DN-table">
              <div class="dn-icon">▦</div>
              <span class="dn-row-name" data-i18n="ui.table">Tabela</span>
            </div>
            <div class="dn-row" data-action="insert-callout">
              <div class="dn-icon">!</div>
              <span class="dn-row-name" data-i18n="ui.callout">Callout</span>
            </div>
          </div>
        </section>

        <section class="dn-section" data-section="media">
          <button class="dn-section-header" type="button" aria-expanded="false">
            <span data-i18n="ui.media">Mídia</span>
            <span class="dn-section-chevron" aria-hidden="true">⌄</span>
          </button>
          <div class="dn-section-content">
            <div class="dn-row" data-action="insert-video">
              <div class="dn-icon">▶</div>
              <span class="dn-row-name" data-i18n="ui.video">Vídeo</span>
            </div>
          </div>
        </section>

        <section class="dn-section" data-section="image">
          <button class="dn-section-header" type="button" aria-expanded="false">
            <span data-i18n="ui.image">Imagem</span>
            <span class="dn-section-chevron" aria-hidden="true">⌄</span>
          </button>
          <div class="dn-section-content">
            <div class="dn-row" data-action="insert-imgtext" data-context-tag="DN-imgText">
              <div class="dn-icon">IT</div>
              <span class="dn-row-name" data-i18n="ui.imageText">Imagem + Texto</span>
            </div>
          </div>
        </section>

        <section class="dn-section" data-section="interaction">
          <button class="dn-section-header" type="button" aria-expanded="false">
            <span data-i18n="ui.interaction">Interação</span>
            <span class="dn-section-chevron" aria-hidden="true">⌄</span>
          </button>
          <div class="dn-section-content">
            <div
              class="dn-row"
              data-action="insert-accordion"
              data-context-tag="DN-accordion"
            >
              <div class="dn-icon">A</div>
              <span class="dn-row-name" data-i18n="ui.accordion">Acordeão</span>
              <button
                class="dn-add"
                data-add="accordion-item"
                title="Adicionar item de acordeão"
                data-i18n-title="ui.addAccordionItem"
              >
                +
              </button>
            </div>
            <div
              class="dn-row"
              data-action="insert-tabs"
              data-context-tag="DN-tabs"
            >
              <div class="dn-icon">Ab</div>
              <span class="dn-row-name" data-i18n="ui.tabs">Abas</span>
              <button
                class="dn-add"
                data-add="tab-item"
                title="Adicionar aba"
                data-i18n-title="ui.addTab"
              >
                +
              </button>
            </div>
            <div
              class="dn-row"
              data-action="insert-cards"
              data-context-tag="DN-cards"
            >
              <div class="dn-icon">Cd</div>
              <span class="dn-row-name" data-i18n="ui.cards">Cards</span>
              <button
                class="dn-add"
                data-add="card-item"
                title="Adicionar card"
                data-i18n-title="ui.addCard"
              >
                +
              </button>
            </div>
            <div
              class="dn-row"
              data-action="insert-flipcard"
              data-context-tag="DN-flipcard"
            >
              <div class="dn-icon">Fc</div>
              <span class="dn-row-name" data-i18n="ui.flipcard">FlipCard</span>
              <button
                class="dn-add"
                data-add="flipcard-item"
                title="Adicionar flipcard"
                data-i18n-title="ui.addFlipcard"
              >
                +
              </button>
            </div>
          </div>
        </section>

        <section class="dn-section" data-section="assessment">
          <button class="dn-section-header" type="button" aria-expanded="false">
            <span data-i18n="ui.assessment">Avaliação</span>
            <span class="dn-section-chevron" aria-hidden="true">⌄</span>
          </button>
          <div class="dn-section-content">
            <div
              class="dn-row"
              data-action="insert-quiz"
              data-context-tag="DN-quiz"
            >
              <div class="dn-icon">?</div>
              <span class="dn-row-name" data-i18n="ui.quiz">Quiz</span>
              <button
                class="dn-add"
                data-add="quiz-item"
                title="Adicionar opção ao quiz"
                data-i18n-title="ui.addQuizOption"
              >
                +
              </button>
            </div>

            <div class="dn-quiz-actions">
              <button
                class="dn-quiz-action"
                data-action="quiz-type-single"
                title="Definir quiz como resposta única"
                data-i18n-title="ui.setSingle"
                data-i18n="ui.single"
              >
                Single
              </button>
              <button
                class="dn-quiz-action"
                data-action="quiz-type-multiple"
                title="Definir quiz como múltiplas respostas"
                data-i18n-title="ui.setMultiple"
                data-i18n="ui.multiple"
              >
                Multiple
              </button>
              <button
                class="dn-quiz-action"
                data-action="quiz-mark-correct"
                title="Marcar opção selecionada como resposta correta"
                data-i18n-title="ui.markCorrect"
                data-i18n="ui.correctAnswer"
              >
                Resposta certa
              </button>
            </div>
          </div>
        </section>

        <section class="dn-section" data-section="navigation">
          <button class="dn-section-header" type="button" aria-expanded="false">
            <span data-i18n="ui.navigation">Navegação</span>
            <span class="dn-section-chevron" aria-hidden="true">⌄</span>
          </button>
          <div class="dn-section-content">
            <div class="dn-row" data-action="insert-continue">
              <div class="dn-icon">→</div>
              <span class="dn-row-name" data-i18n="ui.continueButton"
                >Botão Continuar</span
              >
            </div>
          </div>
        </section>
      </div>

      <div id="dn-status-bar" class="dn-status-bar">
        <span class="dn-status-dot"></span>
        <span id="dn-status-text" data-i18n="ui.ready">DiscereNow pronto.</span>
      </div>
    </div>

    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="i18n.js?v=1.2.0"></script>
    <script src="taskpane.js?v=1.2.0"></script>
  </body>
</html>
